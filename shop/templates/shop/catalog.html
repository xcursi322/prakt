{% extends 'shop/base.html' %}
{% load static %}
{% block title %}Каталог товарів{% endblock %}

{% block content %}
<!-- Головний блок -->
<div id="catalogHero">
    {% include 'shop/partials/catalog_hero.html' %}
</div>

<!-- Блок фільтрів -->
<div class="bg-white rounded-2xl shadow-lg p-6 sm:p-8 mb-10 fade-in-up">
    <div class="flex items-center gap-3 mb-8">
        <div class="w-1 h-8 bg-gradient-to-b from-blue-600 to-indigo-600 rounded-full"></div>
        <h2 class="text-2xl font-bold text-gray-900">Фільтри та пошук</h2>
    </div>
    
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
        <!-- Фільтр категорії -->
        <div class="form-group mb-0">
            <label class="font-bold text-gray-800 mb-3 flex items-center gap-2">
                <i class="fas fa-list text-blue-600 text-lg"></i> Категорія
            </label>
            <select id="categoryFilter" class="w-full p-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition font-medium bg-white hover:border-blue-300">
                <option value="">Всі категорії</option>
                {% for category in categories %}
                    <optgroup label="{{ category.name }}">
                        <option value="{{ category.id }}" {% if selected_category_id|stringformat:"s" == category.id|stringformat:"s" %}selected{% endif %}>
                            {{ category.name }} (всі товари)
                        </option>
                        {% for subcategory in category.subcategories.all %}
                            <option value="{{ subcategory.id }}" {% if selected_category_id|stringformat:"s" == subcategory.id|stringformat:"s" %}selected{% endif %}>
                                {{ subcategory.name }}
                            </option>
                        {% endfor %}
                    </optgroup>
                {% endfor %}
            </select>
        </div>

        <!-- Фільтр сортування -->
        <div class="form-group mb-0">
            <label class="font-bold text-gray-800 mb-3 flex items-center gap-2">
                <i class="fas fa-sort text-blue-600 text-lg"></i> Сортування
            </label>
            <select id="sortFilter" class="w-full p-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition font-medium bg-white hover:border-blue-300">
                <option value="">За замовчуванням</option>
                <option value="newest" {% if selected_sort == 'newest' %}selected{% endif %}>Найновіші</option>
                <option value="price_asc" {% if selected_sort == 'price_asc' %}selected{% endif %}>Ціна: низька → висока</option>
                <option value="price_desc" {% if selected_sort == 'price_desc' %}selected{% endif %}>Ціна: висока → низька</option>
            </select>
        </div>

        <!-- Поле пошуку -->
        <div class="form-group mb-0">
            <label class="font-bold text-gray-800 mb-3 flex items-center gap-2">
                <i class="fas fa-search text-blue-600 text-lg"></i> Пошук
            </label>
            <input type="text" id="searchInput" value="{{ selected_query|default:'' }}" placeholder="Введіть назву товару..." class="w-full p-3 border-2 border-gray-200 rounded-lg focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition font-medium hover:border-blue-300">
        </div>

        <!-- Скинути фільтри -->
        <div class="flex items-end">
            <a href="{% url 'shop:catalog' %}" class="w-full btn btn-secondary py-3 font-semibold flex items-center justify-center gap-2 hover:bg-gray-300">
                <i class="fas fa-redo"></i> Скинути фільтри
            </a>
        </div>
    </div>
</div>


<!-- Інформація про результати (видалено для чистого дизайну) -->



<!-- Сітка товарів (стиль карток як на зразку) -->
<div class="products-grid-perfect" id="productsGrid">
    {% include 'shop/partials/catalog_products_grid.html' %}
</div>

<!-- Модальне вікно вибору смаку -->
<div id="flavorModal" class="fixed inset-0 z-50 hidden items-end sm:items-center justify-center bg-black/50 backdrop-blur-sm">
    <div class="bg-white w-full sm:max-w-sm rounded-t-2xl sm:rounded-2xl shadow-2xl flex flex-col max-h-[85vh]">
        <!-- Заголовок -->
        <div class="flex items-center justify-between px-5 pt-5 pb-3 border-b border-gray-100">
            <span class="text-sm font-bold text-gray-500 tracking-widest uppercase">Виберіть смак</span>
            <button onclick="closeFlavorModal()" class="text-gray-400 hover:text-gray-700 text-2xl leading-none">&times;</button>
        </div>

        <!-- Список смаків -->
        <div class="overflow-y-auto flex-1 px-5 py-3">
            <p class="text-sm text-gray-500 mb-3">Смаки:</p>
            <div id="flavorList" class="space-y-1"></div>
        </div>

        <!-- Кнопка -->
        <div class="px-5 py-4 border-t border-gray-100">
            <button id="flavorAddBtn"
                    onclick="submitFlavorModal()"
                    class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3.5 rounded-xl text-sm tracking-widest uppercase flex items-center justify-center gap-2 transition">
                Додати у кошик <i class="fas fa-chevron-right text-xs"></i>
            </button>
        </div>
    </div>
</div>

<script>
let _flavorModalUrl = '';
let _flavorModalSelected = null;

function openFlavorModal(url, flavors) {
    _flavorModalUrl = url;
    _flavorModalSelected = null;
    const list = document.getElementById('flavorList');
    list.innerHTML = '';
    flavors.forEach(f => {
        const item = document.createElement('label');
        item.className = 'flex items-center gap-3 py-2.5 px-3 rounded-lg cursor-pointer hover:bg-gray-50 transition';
        item.innerHTML = `
            <input type="radio" name="modal_flavor" value="${f.id}" class="accent-red-600 w-4 h-4 flex-shrink-0">
            <span class="w-4 h-4 rounded-full flex-shrink-0 border border-gray-200" style="background:${f.color}"></span>
            <span class="font-semibold text-gray-800 text-sm">${f.name}</span>
        `;
        item.querySelector('input').addEventListener('change', () => { _flavorModalSelected = f.id; });
        list.appendChild(item);
    });
    const modal = document.getElementById('flavorModal');
    modal.classList.remove('hidden');
    modal.classList.add('flex');
    document.body.style.overflow = 'hidden';
}

function closeFlavorModal() {
    const modal = document.getElementById('flavorModal');
    modal.classList.add('hidden');
    modal.classList.remove('flex');
    document.body.style.overflow = '';
}

function submitFlavorModal() {
    if (!_flavorModalSelected) {
        document.getElementById('flavorList').querySelectorAll('label').forEach(l => {
            l.classList.add('animate-pulse');
            setTimeout(() => l.classList.remove('animate-pulse'), 600);
        });
        return;
    }
    const btn = document.getElementById('flavorAddBtn');
    btn.disabled = true;
    btn.textContent = '...';

    const formData = new FormData();
    formData.append('flavor_id', _flavorModalSelected);
    formData.append('quantity', 1);
    formData.append('csrfmiddlewaretoken', '{{ csrf_token }}');

    fetch(_flavorModalUrl, {
        method: 'POST',
        headers: { 'X-Requested-With': 'XMLHttpRequest' },
        body: formData,
    })
    .then(r => r.json())
    .then(data => {
        closeFlavorModal();
        if (data.cart_count !== undefined) {
            document.querySelectorAll('.cart-count, [data-cart-count]').forEach(el => {
                el.textContent = data.cart_count;
            });
        }
    })
    .finally(() => {
        btn.disabled = false;
        btn.innerHTML = 'Додати у кошик <i class="fas fa-chevron-right text-xs"></i>';
    });
}

document.getElementById('flavorModal').addEventListener('click', function(e) {
    if (e.target === this) closeFlavorModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeFlavorModal(); });

// Перехоплення кнопки + на картці
document.addEventListener('click', function(e) {
    const btn = e.target.closest('[data-add-to-cart-url]');
    if (!btn) return;
    e.preventDefault();

    const url = btn.dataset.addToCartUrl;
    const flavors = JSON.parse(btn.dataset.flavors || '[]');

    if (flavors.length > 0) {
        openFlavorModal(url, flavors);
        return;
    }
    
    const formData = new FormData();
    formData.append('quantity', 1);
    formData.append('csrfmiddlewaretoken', '{{ csrf_token }}');
    fetch(url, {
        method: 'POST',
        headers: { 'X-Requested-With': 'XMLHttpRequest' },
        body: formData,
    })
    .then(r => r.json())
    .then(data => {
        if (data.cart_count !== undefined) {
            document.querySelectorAll('.cart-count, [data-cart-count]').forEach(el => {
                el.textContent = data.cart_count;
            });
        }
    });
});
</script>

{% endblock %}
